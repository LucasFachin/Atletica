<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema</title>
 <link rel="stylesheet" href="atletica 2.css">

</head>

<body>

<div id="inicio">
<h1>Faça parte da nossa Atletica</h1>
<button class="botao" onclick="abrirCadastro()">Entrar</button>
<button class="btn-voltar" onclick="">Voltar</button>
</div>

<div id="cadastro">
<div class="form-box">

<h2>Cadastro</h2>

<form>
<input type="text" placeholder="Nome completo" required>
<input type="text" placeholder="Matricula" required>
<input type="email" placeholder="Email" required>
<input type="tel" placeholder="Telefone" required>

<button type="submit">Enviar</button>
<button type="button" onclick="voltarInicio()">Voltar</button>
</form>

</div>
</div>

<script>

function abrirCadastro(){
document.getElementById("inicio").style.display="none";
document.getElementById("cadastro").style.display="flex";
}

function voltarInicio(){
document.getElementById("cadastro").style.display="none";
document.getElementById("inicio").style.display="block";
}

</script>

</body>
</html>
