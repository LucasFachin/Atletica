<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Night | A Festa</title>
    <style>
        :root {
            --ciano: #00f2ff;
            --rosa: #ff007f;
            --dark: #050a12;
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: var(--dark);
            color: white;
            text-align: center;
            /* Reutilizando o fundo de circuitos da Sigma */
            background-image: linear-gradient(rgba(5, 10, 18, 0.8), rgba(5, 10, 18, 0.8)), url('seu-fundo-circuito.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            padding: 50px 20px;
            max-width: 800px;
            margin: auto;
        }

        /* Efeito de Neon no Título */
        .titulo-festa {
            font-size: clamp(3rem, 10vw, 5rem);
            color: var(--ciano);
            text-shadow: 0 0 10px var(--ciano), 0 0 40px var(--ciano);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .data-festa {
            font-size: 1.5rem;
            color: var(--rosa);
            margin-bottom: 40px;
            letter-spacing: 5px;
        }

        /* Contador */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .tempo-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--ciano);
            min-width: 80px;
        }

        .tempo-box span {
            display: block;
            font-size: 2rem;
            color: var(--ciano);
        }

        /* Botão de Ingresso */
        .btn-ingresso {
            background: var(--rosa);
            color: white;
            padding: 20px 50px;
            font-size: 1.5rem;
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--rosa);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-ingresso:hover {
            transform: scale(1.1) rotate(-2deg);
            background: var(--ciano);
            box-shadow: 0 0 30px var(--ciano);
            color: black;
        }

        .info-extra {
            margin-top: 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
        }

        .info-item h4 { color: var(--ciano); margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <p style="color: var(--rosa)">ATLÉTICA SIGMA APRESENTA:</p>
        <h1 class="titulo-festa">RITUAL ODIN</h1>
        <p class="data-festa">25 OUTUBRO | 22:00H</p>

        <div id="countdown">
            <div class="tempo-box"><span id="days">00</span>DIAS</div>
            <div class="tempo-box"><span id="hours">00</span>HORAS</div>
            <div class="tempo-box"><span id="minutes">00</span>MIN</div>
        </div>

        <a href="https://link-do-ingresso.com" class="btn-ingresso">GARANTIR MEU LUGAR</a>

        <div class="info-extra">
            <div class="info-item">
                <h4>LOCAL</h4>
                <p>Halla de Valhalla - Ribeirão Preto</p>
            </div>
            <div class="info-item">
                <h4>OPEN BAR</h4>
                <p>Cerveja, Gummy e Hidromel Tech</p>
            </div>
            <div class="info-item">
                <h4>ATRAÇÕES</h4>
                <p>DJ Corvo Negro & Banda Sigma</p>
            </div>
            <div class="info-item">
                <h4>DRESS CODE</h4>
                <p>Preto e Neon</p>
            </div>
        </div>
    </div>

    <script>
        // Configurar a data da festa aqui
        const dataEvento = new Date("Oct 25, 2026 22:00:00").getTime();

        const atualizarContador = setInterval(function() {
            const agora = new Date().getTime();
            const distancia = dataEvento - agora;

            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("days").innerHTML = dias;
            document.getElementById("hours").innerHTML = horas;
            document.getElementById("minutes").innerHTML = minutos;

            if (distancia < 0) {
                clearInterval(atualizarContador);
                document.getElementById("countdown").innerHTML = "É HOJE!";
            }
        }, 1000);
    </script>

</body>
</html>
