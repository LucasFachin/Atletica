<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Store</title>
    <link rel="stylesheet" href="loja.css">
</head>
<body>

    <header>
        <div class="logo">SIGMA <strong>STORE</strong></div>
        <div class="cart-icon">
            🛒 Carrinho <span class="cart-count" id="count">0</span>
        </div>
    </header>

    <section class="loja-banner">
        <h1>ARMADURAS SIGMA</h1>
        <p>Vistase com o manto de Odin</p>
    </section>

    <div class="vitrine">
        <div class="produto-card">
            <div class="tag">MAIS VENDIDO</div>
            <div class="produto-img">
                <img src="imagens/Screenshot 2026-03-09 at 16-16-07 Instagram.png" alt="Samba Canção" class="img-placeholder">
            </div>
            <div class="produto-info">
                <h3>Samba Canção Sigma</h3>
                <p>O conforto de Valhalla no seu dia a dia.</p>
                <div class="preco">R$ 45,00</div>
                <button class="btn-comprar" onclick="addCart()">Adicionar ao Carrinho</button>
            </div>
        </div>

        <div class="produto-card">
            <div class="produto-img">
                <img src="imagens/Screenshot 2026-03-09 at 16-16-07 Instagram.png" alt="Caneca" class="img-placeholder">
            </div>
            <div class="produto-info">
                <h3>Caneca Alumínio 850ml</h3>
                <p>Acompanha tirante personalizado com LED.</p>
                <div class="preco">R$ 60,00</div>
                <button class="btn-comprar" onclick="addCart()">Adicionar ao Carrinho</button>
            </div>
        </div>

        <div class="produto-card">
            <div class="produto-img">
                <img src="imagens/Screenshot 2026-03-09 at 16-16-07 Instagram.png" alt="Jersei" class="img-placeholder">
            </div>
            <div class="produto-info">
                <h3>Oficial Odin v.2</h3>
                <p>dry-fit tecnológico.</p>
                <div class="preco">R$ 120,00</div>
                <button class="btn-comprar" onclick="addCart()">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>

    <script>
        let contador = 0;
        function addCart() {
            contador++;
            document.getElementById('count').innerText = contador;
            alert("Manto sagrado adicionado ao carrinho!");
        }
    </script>

</body>
